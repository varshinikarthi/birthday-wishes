<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday Sir</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            padding: 30px;
        }
        .card {
            background: white;
            padding: 25px;
            max-width: 900px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.15);
        }
        h1 {
            color: #333;
        }
        p {
            font-size: 18px;
            color: #555;
        }
        .gallery {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .gallery img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 Happy Birthday Sir 🎉</h1>

    <p>
        You inspire us not only as a teacher but also as a passionate photographer.
        Your photographs show your talent and creativity, and your work always motivates us.
        We are proud to learn from you. Wishing you a very happy birthday, sir!
    </p>

    <h2>📸 Photographs by Sir</h2>

    <div class="gallery">
        <img src="https://img.sanishtech.com/u/81b8bc0a2f799072bb536de856ebe78f.png">
        <img src="PHOTO_LINK_2" alt="Photograph by Sir">
        <img src="PHOTO_LINK_3" alt="Photograph by Sir">
    </div>
</div>

</body>
</html>
